# Minimal desired state for a Spring Boot API.
# CI supplies artifact URL/version/checksum when it creates a deployment.

[app]
id = "spring-boot-api"
name = "Spring Boot API"
kind = "spring-boot"
environment = "prod"

[target]
nodes = []

[target.labels]
env = "prod"
region = "kr-seoul"
"role.api" = "true"
"runtime.java" = "true"

[deploy]
artifact_dir = "/srv/jejucd/apps/spring-boot-api/current"
release_dir = "/srv/jejucd/apps/spring-boot-api/releases"
retain = 5
