# Minimal desired state for a Rust Axum API.
# CI supplies artifact URL/version/checksum when it creates a deployment.

[app]
id = "rust-axum-api"
name = "Rust Axum API"
kind = "rust-service"
environment = "prod"

[target]
nodes = []

[target.labels]
env = "prod"
region = "kr-seoul"
"role.api" = "true"
"runtime.native" = "true"

[deploy]
artifact_dir = "/srv/jejucd/apps/rust-axum-api/current"
release_dir = "/srv/jejucd/apps/rust-axum-api/releases"
retain = 5
