# Minimal desired state for a PHP-FPM application.
# CI supplies artifact URL/version/checksum when it creates a deployment.

[app]
id = "php-shop"
name = "PHP Shop"
kind = "php-fpm"
environment = "prod"

[target]
nodes = []

[target.labels]
env = "prod"
region = "kr-seoul"
"role.web" = "true"
"runtime.php" = "true"

[deploy]
artifact_dir = "/srv/jejucd/apps/php-shop/current"
release_dir = "/srv/jejucd/apps/php-shop/releases"
retain = 5
