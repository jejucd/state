# Minimal desired state for a React static site.
# CI supplies artifact URL/version/checksum when it creates a deployment.

[app]
id = "react-admin"
name = "React Admin"
kind = "react-static"
environment = "prod"

[target]
nodes = []

[target.labels]
env = "prod"
region = "kr-seoul"
"role.web" = "true"
"runtime.react" = "true"

[deploy]
artifact_dir = "/srv/jejucd/apps/react-admin/current"
release_dir = "/srv/jejucd/apps/react-admin/releases"
retain = 5
