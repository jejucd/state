# Desired state for the primary JejuCD control-plane node.

[node]
name = "kr-seoul-m-01"
hostname = "kr-seoul-m-01"
address = "10.0.0.10"
datacenter = "kr-seoul-01"
environment = "prod"
status = "active"
description = "Primary JejuCD manager node"

[scheduling]
enabled = false
reason = "control-plane node"

[ownership]
team = "platform-ops"
admin_primary = "Kim Star"
admin_secondary = "Lee Cloud"

[placement]
roles = ["control-plane"]
service_types = ["manager"]
labels = ["region:seoul", "zone:core"]

[tags]
values = [
  "region:seoul",
  "hardware:ssd",
  "system:jejucd-manager",
  "system:postgres-client",
  "taint:no-apps"
]

[capacity]
port_start = 0
port_end = 0
max_apps = 0

[hardware]
cpu_cores = 16
ram_gb = 32
serial = "SN-M200-ABC"
bmc_address = "10.0.1.10"
