# Desired state for the customer-facing frontend node.

[node]
name = "nodefront01svc"
hostname = "nodefront01svc"
address = "10.0.0.101"
datacenter = "kr-seoul-01"
environment = "prod"
status = "active"
description = "Customer web and API application node"

[scheduling]
enabled = true
reason = ""

[ownership]
team = "platform-ops"
admin_primary = "Kim Star"
admin_secondary = "Lee Cloud"

[placement]
roles = ["web", "api", "static", "php"]
service_types = ["customer-web", "example-api", "example-static", "example-php"]
labels = ["region:seoul", "zone:frontend", "hardware:ssd"]

[tags]
values = [
  "legacy_group:nodefrontsvc"
]

[capacity]
port_start = 8000
port_end = 8999
max_apps = 20

[hardware]
cpu_cores = 8
ram_gb = 16
serial = "SN-A100-XYZ"
bmc_address = ""
